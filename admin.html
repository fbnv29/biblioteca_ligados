<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Biblioteca Academia Ligados</title>
    <link rel="stylesheet" href="ligados-design-system.css">
    <link rel="icon" href="https://res.cloudinary.com/dhw3ebc6w/image/upload/v1772942627/ligados_crop_db1aed.png">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0a192f 0%, #112240 100%);
            min-height: 100vh;
            padding-bottom: var(--sp-xl);
        }

        .admin-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--sp-m) 5%;
            background: rgba(10, 25, 47, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-container {
            max-width: 1100px;
            margin: var(--sp-xl) auto;
            padding: 0 var(--sp-m);
        }

        .dashboard-header {
            margin-bottom: var(--sp-xl);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-md);
            padding: var(--sp-xl);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .form-section {
            margin-bottom: var(--sp-xl);
        }

        .input-group label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        input,
        select,
        textarea {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            border-radius: var(--radius-sm) !important;
            padding: 12px 15px !important;
            transition: all 0.3s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--brand-accent) !important;
            background: rgba(255, 255, 255, 0.08) !important;
            outline: none;
        }

        .file-list {
            display: grid;
            gap: var(--sp-m);
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .file-list::-webkit-scrollbar {
            width: 6px;
        }

        .file-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        .file-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .file-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-sm);
            padding: var(--sp-m);
            display: flex;
            align-items: center;
            gap: var(--sp-l);
            transition: all 0.2s ease;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .item-thumb {
            width: 80px;
            height: 55px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-msg {
            margin-top: var(--sp-m);
            padding: var(--sp-m);
            border-radius: var(--radius-sm);
            font-weight: 500;
            text-align: center;
        }

        .success {
            background: rgba(46, 213, 115, 0.1);
            color: #2ed573;
            border: 1px solid #2ed573;
        }

        .error {
            background: rgba(255, 71, 87, 0.1);
            color: #ff4757;
            border: 1px solid #ff4757;
        }

        /* --- Modal Styles --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--bg-secondary);
            width: 90%;
            max-width: 600px;
            padding: var(--sp-xl);
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .close-modal:hover {
            opacity: 1;
        }

        /* --- Filter Styles --- */
        .filter-bar {
            background: rgba(255, 255, 255, 0.02);
            padding: var(--sp-m);
            border-radius: var(--radius-sm);
            margin-bottom: var(--sp-m);
            display: flex;
            gap: var(--sp-m);
            align-items: center;
            flex-wrap: wrap;
        }

        .search-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            flex: 1;
            min-width: 200px;
        }

        .file-item-actions {
            display: flex;
            gap: 10px;
        }

        .btn-edit {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
        }

        .btn-edit:hover {
            background: var(--brand-accent);
            color: var(--brand-blue);
        }

        .btn-delete {
            background: transparent;
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.2);
            padding: 8px 15px;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background: #ff4757;
            color: white;
        }

        .material-icons {
            vertical-align: middle;
            line-height: .8;
        }

        /* Responsive */
        @media (max-width: 768px) {

            .grid-3,
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <nav class="admin-nav">
        <div class="logo-brand" style="transform: scale(0.8);"></div>
        <div id="logout-btn" onclick="logout()"
            style="display: none; cursor: pointer; color: var(--brand-accent); font-weight: bold; font-size: 0.8rem; letter-spacing: 1px; display: flex; align-items: center; gap: 8px;">
            <span class="material-icons" style="font-size: 1.1rem;">logout</span> CERRAR SESIÓN
        </div>
    </nav>

    <div class="admin-container animate-reveal">
        <div id="auth-section" class="glass-card" style="max-width: 450px; margin: 100px auto; text-align: center;">
            <h2 style="margin-bottom: var(--sp-m); color: var(--brand-accent);">Acceso Staff</h2>
            <p style="opacity: 0.7; margin-bottom: var(--sp-l); font-size: 0.9rem;">Introduce el token de seguridad para
                gestionar la biblioteca.</p>
            <div class="input-group" style="text-align: left;">
                <label>Token Maestro</label>
                <input type="password" id="admin-token" placeholder="••••••••" style="width: 100%;">
            </div>
            <button class="btn"
                style="width: 100%; margin-top: var(--sp-m); display: flex; align-items: center; justify-content: center; gap: 10px;"
                onclick="checkAuth()">
                <span class="material-icons">login</span> ENTRAR AL PANEL
            </button>
        </div>

        <main id="admin-content" style="display: none;">
            <div class="dashboard-header">
                <div>
                    <h1 style="font-size: 2.2rem; color: var(--brand-white);">Admin <span
                            style="color: var(--brand-accent);">Ligados</span></h1>
                    <p style="opacity: 0.6;">Gestiona los recursos educativos de la plataforma.</p>
                </div>
            </div>

            <section class="form-section">
                <div class="glass-card">
                    <h3 style="margin-bottom: var(--sp-l); display: flex; align-items: center; gap: 10px;">
                        <span class="material-icons" style="color: var(--brand-accent);">add_circle</span>
                        Publicar Nuevo Recurso
                    </h3>
                    <form id="upload-form">
                        <div class="grid grid-3">
                            <div class="input-group">
                                <label>Título de la Lección</label>
                                <input type="text" id="title" required placeholder="Ej: Técnica de Púa Híbrida">
                            </div>
                            <div class="input-group">
                                <label>Instrumento / Área</label>
                                <select id="instrument" required>
                                    <option value="guitarra">Guitarra</option>
                                    <option value="piano">Piano</option>
                                    <option value="bateria">Batería</option>
                                    <option value="bajo">Bajo</option>
                                    <option value="violin">Violín</option>
                                    <option value="cello">Cello</option>
                                    <option value="ligaditos">Ligaditos (Niños)</option>
                                    <option value="teatro">Teatro</option>
                                    <option value="artes_visuales">Artes Visuales</option>
                                    <option value="canto">Canto</option>
                                    <option value="teoria">Teoría / Otros</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label>Nivel de Dificultad</label>
                                <select id="level" required>
                                    <option value="iniciacion">Iniciación</option>
                                    <option value="intermedio">Intermedio</option>
                                    <option value="avanzado">Avanzado</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-2" style="margin-top: var(--sp-m);">
                            <div class="input-group">
                                <label>Formato del Archivo</label>
                                <select id="category" required>
                                    <option value="pdf">PDF / Guía / Documento</option>
                                    <option value="partitura">Partitura / TAB</option>
                                    <option value="audio">Audio / MP3 / Backing Track</option>
                                    <option value="video">Clase en Video</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label>Etiquetas (separadas por coma)</label>
                                <input type="text" id="tags" placeholder="ej: jazz, armonía, principiante">
                            </div>
                        </div>

                        <div class="input-group" style="margin-top: var(--sp-m);">
                            <label>Breve Descripción</label>
                            <textarea id="description" rows="2"
                                placeholder="Describe brevemente de qué trata este material..."></textarea>
                        </div>

                        <div class="grid grid-2"
                            style="margin-top: var(--sp-m); background: rgba(255,255,255,0.02); padding: var(--sp-m); border-radius: var(--radius-sm);">
                            <div class="input-group">
                                <label>Archivo Principal (PDF, MP3, etc)</label>
                                <input type="file" id="file" required
                                    style="border: none !important; background: transparent !important; padding: 0 !important;">
                            </div>
                            <div class="input-group">
                                <label>Miniatura Personalizada (Opcional)</label>
                                <input type="file" id="thumbnail" accept="image/*"
                                    style="border: none !important; background: transparent !important; padding: 0 !important;">
                            </div>
                        </div>

                        <div style="margin-top: var(--sp-l); display: flex; align-items: center; gap: 20px;">
                            <button type="submit" class="btn" id="submit-btn"
                                style="min-width: 200px; display: flex; align-items: center; justify-content: center; gap: 10px;">
                                <span class="material-icons">cloud_upload</span> PUBLICAR RECURSO
                            </button>
                            <div id="upload-status" class="status-msg" style="flex: 1; margin: 0; display: none;"></div>
                        </div>
                    </form>
                </div>
            </section>

            <section>
                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--sp-m);">
                    <h3 style="opacity: 0.7; margin: 0; display: flex; align-items: center; gap: 10px;">
                        <span class="material-icons">folder</span> Repositorio de Archivos
                    </h3>
                </div>

                <div class="filter-bar">
                    <input type="text" id="search-files" class="search-input" placeholder="Buscar por título o tags..."
                        oninput="filterRepository()">
                    <select id="filter-instrument" onchange="filterRepository()"
                        style="width: auto; padding: 6px 15px; font-size: 0.8rem;">
                        <option value="all">Todos los Instrumentos</option>
                        <option value="guitarra">Guitarra</option>
                        <option value="piano">Piano</option>
                        <option value="bateria">Batería</option>
                        <option value="bajo">Bajo</option>
                        <option value="violin">Violín</option>
                        <option value="cello">Cello</option>
                        <option value="ligaditos">Ligaditos</option>
                        <option value="teatro">Teatro</option>
                        <option value="artes_visuales">Artes Visuales</option>
                        <option value="canto">Canto</option>
                        <option value="teoria">Teoría</option>
                    </select>
                    <select id="filter-category" onchange="filterRepository()"
                        style="width: auto; padding: 6px 15px; font-size: 0.8rem;">
                        <option value="all">Todas las Categorías</option>
                        <option value="pdf">Guías/PDF</option>
                        <option value="partitura">Partituras</option>
                        <option value="audio">Audios</option>
                        <option value="video">Videos</option>
                    </select>
                </div>

                <div id="file-list" class="file-list">
                    <!-- Dinámico -->
                </div>
            </section>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeEditModal()">✕</span>
            <h3 style="color: var(--brand-accent); margin-bottom: var(--sp-l);">Editar Recurso</h3>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <div class="input-group">
                    <label>Título</label>
                    <input type="text" id="edit-title" required>
                </div>
                <div class="grid grid-2" style="margin-top: var(--sp-m);">
                    <div class="input-group">
                        <label>Instrumento</label>
                        <select id="edit-instrument">
                            <option value="guitarra">Guitarra</option>
                            <option value="piano">Piano</option>
                            <option value="bateria">Batería</option>
                            <option value="bajo">Bajo</option>
                            <option value="violin">Violín</option>
                            <option value="cello">Cello</option>
                            <option value="ligaditos">Ligaditos</option>
                            <option value="teatro">Teatro</option>
                            <option value="artes_visuales">Artes Visuales</option>
                            <option value="canto">Canto</option>
                            <option value="teoria">Teoría</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Categoría</label>
                        <select id="edit-category">
                            <option value="pdf">PDF / Guía</option>
                            <option value="partitura">Partitura / TAB</option>
                            <option value="audio">Audio / MP3</option>
                            <option value="video">Clase en Video</option>
                        </select>
                    </div>
                </div>
                <div class="input-group" style="margin-top: var(--sp-m);">
                    <label>Descripción</label>
                    <textarea id="edit-description" rows="3"></textarea>
                </div>
                <div class="input-group" style="margin-top: var(--sp-m);">
                    <label>Tags (separados por coma)</label>
                    <input type="text" id="edit-tags">
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: var(--sp-l);">GUARDAR CAMBIOS</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = "https://biblioteca-ligados-api.academia-ligados-cl.workers.dev";
        let MASTER_TOKEN = localStorage.getItem("ligados_admin_token") || "";
        let allFiles = [];

        if (MASTER_TOKEN) verifyAndShow();

        async function verifyAndShow() {
            try {
                const res = await fetch(`${API_BASE}/api/verify`, {
                    headers: { "Authorization": `Bearer ${MASTER_TOKEN}` }
                });
                if (res.ok) {
                    showAdmin();
                } else {
                    localStorage.removeItem("ligados_admin_token");
                    document.getElementById("auth-section").style.display = "block";
                }
            } catch (err) {
                console.error("Auth failed", err);
            }
        }

        async function checkAuth() {
            const tokenInput = document.getElementById("admin-token");
            const token = tokenInput.value;
            if (!token) return;

            try {
                const res = await fetch(`${API_BASE}/api/verify`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if (res.ok) {
                    MASTER_TOKEN = token;
                    localStorage.setItem("ligados_admin_token", token);
                    showAdmin();
                } else {
                    alert("Token inválido. Acceso denegado.");
                    tokenInput.value = "";
                }
            } catch (err) {
                alert("Error de conexión con el servidor.");
            }
        }

        function showAdmin() {
            document.getElementById("auth-section").style.display = "none";
            document.getElementById("admin-content").style.display = "block";
            document.getElementById("logout-btn").style.display = "block";
            loadFiles();
        }

        function logout() {
            localStorage.removeItem("ligados_admin_token");
            window.location.reload();
        }

        async function loadFiles() {
            try {
                const res = await fetch(`${API_BASE}/api/files`);
                allFiles = await res.json();
                renderFiles(allFiles);
            } catch (err) { console.error(err); }
        }

        function renderFiles(files) {
            const list = document.getElementById("file-list");
            list.innerHTML = files.length ? "" : "<p style='opacity:0.5; padding: 20px; text-align: center;'>No se encontraron recursos.</p>";

            [...files].reverse().forEach(file => {
                const item = document.createElement("div");
                item.className = "file-item animate-reveal";
                const thumb = file.thumbnail_url || 'https://via.placeholder.com/150?text=Ligados';
                item.innerHTML = `
                    <img src="${thumb}" class="item-thumb" alt="thumb">
                    <div style="flex: 1;">
                        <div style="display: flex; gap: 8px; margin-bottom: 2px;">
                            <span style="font-size: 0.65rem; background: var(--brand-accent); color: var(--brand-blue); padding: 1px 6px; border-radius: 3px; font-weight: bold; text-transform: uppercase;">${file.category}</span>
                        </div>
                        <strong style="font-size:1.1rem; color: white;">${file.title}</strong><br>
                        <small style="opacity: 0.6;">${file.instrument.toUpperCase()} • ${file.level.toUpperCase()} • ${file.size}</small>
                    </div>
                    <div class="file-item-actions">
                        <button class="btn-edit" onclick="openEditModal('${file.id}')" style="display: flex; align-items: center; gap: 5px;">
                            <span class="material-icons" style="font-size: 1rem;">edit</span> Editar
                        </button>
                        <button class="btn-delete" onclick="deleteFile('${file.id}')" style="display: flex; align-items: center; gap: 5px;">
                            <span class="material-icons" style="font-size: 1rem;">delete</span> Eliminar
                        </button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function filterRepository() {
            const searchTerm = document.getElementById("search-files").value.toLowerCase();
            const instrument = document.getElementById("filter-instrument").value;
            const category = document.getElementById("filter-category").value;

            const filtered = allFiles.filter(file => {
                const matchesSearch = file.title.toLowerCase().includes(searchTerm) ||
                    (file.tags && file.tags.some(t => t.toLowerCase().includes(searchTerm)));
                const matchesInstrument = instrument === "all" || file.instrument === instrument;
                const matchesCategory = category === "all" || file.category === category;
                return matchesSearch && matchesInstrument && matchesCategory;
            });

            renderFiles(filtered);
        }

        function openEditModal(id) {
            const file = allFiles.find(f => f.id === id);
            if (!file) return;

            document.getElementById("edit-id").value = file.id;
            document.getElementById("edit-title").value = file.title;
            document.getElementById("edit-instrument").value = file.instrument;
            document.getElementById("edit-category").value = file.category;
            document.getElementById("edit-description").value = file.description || "";
            document.getElementById("edit-tags").value = (file.tags || []).join(", ");

            document.getElementById("edit-modal").style.display = "flex";
        }

        function closeEditModal() {
            document.getElementById("edit-modal").style.display = "none";
        }

        document.getElementById("edit-form").onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById("edit-id").value;
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;

            btn.disabled = true;
            btn.textContent = "Guardando...";

            const updates = {
                title: document.getElementById("edit-title").value,
                instrument: document.getElementById("edit-instrument").value,
                category: document.getElementById("edit-category").value,
                description: document.getElementById("edit-description").value,
                tags: document.getElementById("edit-tags").value.split(",").map(t => t.trim()).filter(t => t)
            };

            try {
                const res = await fetch(`${API_BASE}/api/files/${id}`, {
                    method: "PUT",
                    headers: {
                        "Authorization": `Bearer ${MASTER_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(updates)
                });

                if (res.ok) {
                    closeEditModal();
                    loadFiles(); // Refresh the list
                } else { alert("Error al actualizar metadatos."); }
            } catch (err) {
                alert("Error de conexión.");
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        };

        document.getElementById("upload-form").onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById("submit-btn");
            const status = document.getElementById("upload-status");
            btn.disabled = true;
            btn.textContent = "Subiendo...";

            const formData = new FormData();
            formData.append("file", document.getElementById("file").files[0]);

            const thumbFile = document.getElementById("thumbnail").files[0];
            if (thumbFile) formData.append("thumbnail", thumbFile);

            const metadata = {
                title: document.getElementById("title").value,
                instrument: document.getElementById("instrument").value,
                level: document.getElementById("level").value,
                category: document.getElementById("category").value,
                description: document.getElementById("description").value,
                tags: document.getElementById("tags").value.split(",").map(t => t.trim()).filter(t => t)
            };
            formData.append("metadata", JSON.stringify(metadata));

            try {
                const res = await fetch(`${API_BASE}/api/upload`, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${MASTER_TOKEN}` },
                    body: formData
                });

                if (res.ok) {
                    status.textContent = "Publicado con éxito.";
                    status.className = "status-msg success";
                    status.style.display = "block";
                    document.getElementById("upload-form").reset();
                    loadFiles();
                } else { throw new Error(); }
            } catch (err) {
                status.textContent = "Error al subir. Revisa token/conexión.";
                status.className = "status-msg error";
                status.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.textContent = "Publicar Ahora";
            }
        };

        async function deleteFile(id) {
            if (!confirm("¿Eliminar este recurso?")) return;
            try {
                await fetch(`${API_BASE}/api/files/${id}`, {
                    method: "DELETE",
                    headers: { "Authorization": `Bearer ${MASTER_TOKEN}` }
                });
                loadFiles();
            } catch (err) { alert("Error"); }
        }
    </script>
</body>

</html>
